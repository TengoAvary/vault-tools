<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cluster Explorer</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg:#06060c; --panel:#0a0a14; --border:#1a1a2e;
    --text:#d0d0e0; --dim:#555570;
    --cyan:#00f0ff; --magenta:#ff00aa; --green:#00ff88;
    --yellow:#ffcc00; --orange:#ff6622;
    --mono:'SF Mono','Fira Code','Consolas',monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:13px; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  header { display:flex; align-items:center; gap:14px; padding:10px 20px; border-bottom:1px solid var(--border); background:var(--panel); flex-shrink:0; z-index:10; }
  header h1 { font-size:15px; color:var(--cyan); text-shadow:0 0 10px #00f0ff40; white-space:nowrap; }
  header select { background:var(--bg); color:var(--text); border:1px solid var(--border); padding:5px 10px; border-radius:4px; font-size:12px; min-width:180px; }
  header select:focus { border-color:var(--cyan); outline:none; }
  .btn { background:transparent; color:var(--cyan); border:1px solid var(--cyan); padding:5px 12px; border-radius:4px; cursor:pointer; font-size:12px; transition:all .2s; }
  .btn:hover { background:#00f0ff15; box-shadow:0 0 10px #00f0ff30; }
  .spacer { flex:1; }
  .breadcrumb { display:flex; align-items:center; gap:4px; font-size:12px; }
  .breadcrumb span { color:var(--dim); cursor:pointer; transition:color .2s; }
  .breadcrumb span:hover { color:var(--cyan); }
  .breadcrumb span.current { color:var(--cyan); cursor:default; }
  .breadcrumb .sep { color:var(--border); cursor:default; }

  .main { flex:1; position:relative; overflow:hidden; }
  canvas { width:100%; height:100%; cursor:pointer; }

  /* Info panel */
  .info { position:absolute; top:16px; right:16px; width:300px; background:var(--panel)ee; border:1px solid var(--border); border-radius:8px; padding:18px; display:none; max-height:calc(100vh - 100px); overflow-y:auto; box-shadow:0 0 30px #00000060; backdrop-filter:blur(8px); }
  .info.open { display:block; }
  .info::-webkit-scrollbar { width:5px; }
  .info::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  .info-close { position:absolute; top:8px; right:12px; background:none; border:none; color:var(--dim); font-size:18px; cursor:pointer; }
  .info-close:hover { color:var(--text); }
  .info-name { font-size:18px; font-weight:700; margin-bottom:4px; padding-right:24px; }
  .info-desc { color:var(--dim); font-size:12px; line-height:1.5; margin-bottom:14px; }
  .info-stat { font-family:var(--mono); font-size:11px; color:var(--dim); margin-bottom:12px; }
  .info-section { font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--magenta); margin:12px 0 6px; }
  .info-tag { display:flex; justify-content:space-between; padding:2px 0; font-size:12px; border-bottom:1px solid #0f0f1a; }
  .info-tag-name { font-family:var(--mono); font-size:11px; }
  .info-tag-weight { color:var(--dim); font-family:var(--mono); font-size:10px; }

  /* Tooltip */
  .tooltip { position:absolute; pointer-events:none; background:var(--panel); border:1px solid var(--border); border-radius:6px; padding:8px 12px; font-size:12px; display:none; box-shadow:0 0 20px #00000040; z-index:20; white-space:nowrap; }
  .tooltip.show { display:block; }
  .tooltip-name { font-weight:600; margin-bottom:2px; }
  .tooltip-count { color:var(--dim); font-size:11px; font-family:var(--mono); }

  /* Add corpus modal */
  .modal-overlay { display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:#000000cc; z-index:100; justify-content:center; align-items:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--panel); border:1px solid var(--border); border-radius:8px; width:450px; padding:24px; }
  .modal h2 { font-size:16px; color:var(--cyan); margin-bottom:16px; }
  .form-group { margin-bottom:12px; }
  .form-group label { display:block; font-size:11px; color:var(--dim); margin-bottom:3px; text-transform:uppercase; letter-spacing:1px; }
  .form-group input { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:7px 10px; border-radius:4px; font-family:var(--mono); font-size:12px; }
  .form-group input:focus { border-color:var(--cyan); outline:none; }
  .form-error { color:var(--magenta); font-size:12px; margin-top:8px; }
  .form-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }
</style>
</head>
<body>
<header>
  <h1>Cluster Explorer</h1>
  <select id="corpus-select"><option value="">No corpora</option></select>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="spacer"></div>
  <button class="btn" onclick="openAddCorpus()">+ Add Corpus</button>
</header>

<div class="main">
  <canvas id="canvas"></canvas>
  <div class="tooltip" id="tooltip"><div class="tooltip-name"></div><div class="tooltip-count"></div></div>
  <div class="info" id="info">
    <button class="info-close" onclick="closeInfo()">&times;</button>
    <div id="info-content"></div>
  </div>
</div>

<div class="modal-overlay" id="add-modal" onclick="if(event.target===this)closeAddCorpus()">
  <div class="modal">
    <h2>Add Corpus</h2>
    <div class="form-group"><label>Name</label><input id="ac-name" placeholder="e.g. ChatGPT"></div>
    <div class="form-group"><label>Vault DB</label><input id="ac-db" placeholder="/path/to/.vault-index/vault.db"></div>
    <div class="form-group"><label>Vault Directory</label><input id="ac-dir" placeholder="/path/to/vault"></div>
    <div class="form-error" id="ac-error"></div>
    <div class="form-actions">
      <button class="btn" onclick="closeAddCorpus()">Cancel</button>
      <button class="btn" onclick="submitCorpus()">Add</button>
    </div>
  </div>
</div>

<script>
const COLORS = ['#00f0ff','#ff00aa','#00ff88','#ffcc00','#ff6622','#aa44ff','#44ffaa','#ff4466','#44aaff','#ffaa00','#ff44ff','#44ffff','#aaff44','#ff8844','#8844ff'];

let corpora = [], currentCorpus = null;
let allNodes = [];
let colorMap = {};
let focusId = null; // null = root view
let circles = []; // packed circles for current view
let animCircles = []; // animation targets
let animT = 0;
let hoveredCircle = null;
let selectedCircle = null;

// Camera (pan/zoom)
let camX = 0, camY = 0, camZoom = 1;
let dragging = false, dragStartX = 0, dragStartY = 0, dragCamX = 0, dragCamY = 0;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ── API ──
async function api(path, opts) { return (await fetch(path, opts)).json(); }

// ── Corpora ──
async function loadCorpora() {
  corpora = await api('/api/corpora');
  const sel = document.getElementById('corpus-select');
  sel.innerHTML = '';
  if (!corpora.length) { sel.innerHTML = '<option value="">No corpora</option>'; return; }
  corpora.forEach(c => { const o = document.createElement('option'); o.value = c.id; o.textContent = c.name; sel.appendChild(o); });
  if (!currentCorpus) currentCorpus = corpora[0].id;
  sel.value = currentCorpus;
  loadData();
}
document.getElementById('corpus-select').addEventListener('change', e => { currentCorpus = e.target.value; loadData(); });

function openAddCorpus() { document.getElementById('add-modal').classList.add('open'); }
function closeAddCorpus() { document.getElementById('add-modal').classList.remove('open'); document.getElementById('ac-error').textContent=''; }
async function submitCorpus() {
  const name=document.getElementById('ac-name').value.trim(), db=document.getElementById('ac-db').value.trim(), dir=document.getElementById('ac-dir').value.trim();
  if(!name||!db||!dir){document.getElementById('ac-error').textContent='All fields required';return;}
  const res=await api('/api/corpora',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,vault_db:db,vault_dir:dir})});
  if(res.error){document.getElementById('ac-error').textContent=res.error;return;}
  currentCorpus=res.id; closeAddCorpus(); loadCorpora();
}

// ── Data ──
async function loadData() {
  if (!currentCorpus) return;
  const clusters = await api(`/api/${currentCorpus}/clusters`);
  allNodes = clusters;

  // Assign colors: roots get evenly spaced hues, children inherit with jitter
  colorMap = {};
  const roots = allNodes.filter(n => n.depth === 0).sort((a,b) => b.tag_count - a.tag_count);
  // Assign root hues evenly around the wheel, high saturation
  roots.forEach((r, i) => {
    const hue = (i / roots.length) * 360;
    colorMap[r.cluster_id] = { h: hue, s: 90, l: 60 };
  });
  // Assign children recursively with shrinking jitter
  function assignChildColors(parentId, depth) {
    const children = allNodes.filter(n => n.parent_id === parentId);
    const parentColor = colorMap[parentId];
    if (!parentColor) return;
    // Jitter shrinks with depth: ±40 at depth 1, ±20 at depth 2, etc.
    const hueJitter = 40 / depth;
    const slJitter = 10 / depth;
    children.forEach((c, i) => {
      // Deterministic-ish random based on index
      const seed = (i * 137.5 + 73) % 360;
      const hOff = (seed / 360 - 0.5) * 2 * hueJitter;
      const sOff = ((seed * 0.7) % 20 - 10) / 10 * slJitter;
      const lOff = ((seed * 1.3) % 20 - 10) / 10 * slJitter;
      colorMap[c.cluster_id] = {
        h: (parentColor.h + hOff + 360) % 360,
        s: Math.max(50, Math.min(100, parentColor.s + sOff)),
        l: Math.max(40, Math.min(75, parentColor.l + lOff)),
      };
      assignChildColors(c.cluster_id, depth + 1);
    });
  }
  roots.forEach(r => assignChildColors(r.cluster_id, 1));

  focusId = null;
  selectedCircle = null;
  closeInfo();
  packAndDraw();
}

function getColor(node) {
  const c = colorMap[node.cluster_id];
  if (!c) return '#666';
  return `hsl(${c.h}, ${c.s}%, ${c.l}%)`;
}

function getColorA(node, alpha) {
  const c = colorMap[node.cluster_id];
  if (!c) return `rgba(102,102,102,${alpha})`;
  return `hsla(${c.h}, ${c.s}%, ${c.l}%, ${alpha})`;
}

// ── Circle packing ──
function packCircles(nodes, cx, cy, radius) {
  if (!nodes.length) return [];

  const sorted = [...nodes].sort((a,b) => b.tag_count - a.tag_count);

  if (sorted.length === 1) {
    return [{ node: sorted[0], x: cx, y: cy, r: radius * 0.85 }];
  }

  // Compute radii proportional to sqrt(tag_count), scaled to fit
  const sqrts = sorted.map(n => Math.sqrt(n.tag_count));
  const totalSqrtArea = sqrts.reduce((s,v) => s + v*v, 0);
  // Scale so total circle area fits ~70% of container area
  const areaScale = (radius * radius * 0.7) / totalSqrtArea;
  const radii = sqrts.map(v => Math.sqrt(v * v * areaScale));

  // Initial placement: spiral
  const circles = [];
  for (let i = 0; i < sorted.length; i++) {
    const angle = i * 2.399963; // golden angle
    const dist = i === 0 ? 0 : radii[i] * 1.5 + i * 3;
    circles.push({
      node: sorted[i],
      x: cx + Math.cos(angle) * dist,
      y: cy + Math.sin(angle) * dist,
      r: radii[i],
    });
  }

  // Force simulation to separate overlaps and pull toward center
  const pad = 4;
  for (let iter = 0; iter < 300; iter++) {
    let maxOverlap = 0;

    // Separate overlapping circles — hard constraint
    for (let i = 0; i < circles.length; i++) {
      for (let j = i + 1; j < circles.length; j++) {
        const a = circles[i], b = circles[j];
        let dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 0.01;
        const minDist = a.r + b.r + pad;
        const overlap = minDist - dist;
        if (overlap > 0) {
          maxOverlap = Math.max(maxOverlap, overlap);
          // Push apart proportionally to overlap
          const push = overlap / dist * 0.75;
          const wx = dx * push, wy = dy * push;
          a.x -= wx; a.y -= wy;
          b.x += wx; b.y += wy;
        }
      }
    }

    // Pull toward center (weaker than separation)
    for (const c of circles) {
      c.x += (cx - c.x) * 0.02;
      c.y += (cy - c.y) * 0.02;
    }

    // Contain within boundary
    for (const c of circles) {
      const dx = c.x - cx, dy = c.y - cy;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const maxDist = radius - c.r - 2;
      if (dist > maxDist && dist > 0) {
        c.x = cx + dx / dist * maxDist;
        c.y = cy + dy / dist * maxDist;
      }
    }

    // Early exit if settled
    if (maxOverlap < 0.5) break;
  }

  return circles;
}

function packAndDraw() {
  resize();
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  const centerX = 0;
  const centerY = 0;
  const maxR = Math.min(w, h) * 0.42;

  let children;
  if (focusId === null) {
    children = allNodes.filter(n => n.depth === 0);
  } else {
    children = allNodes.filter(n => n.parent_id === focusId);
  }

  if (!children.length) return;

  const packed = packCircles(children, centerX, centerY, maxR);

  // For each packed circle, also pack its children inside it
  const allCircles = [];
  for (const c of packed) {
    allCircles.push(c);
    const grandchildren = allNodes.filter(n => n.parent_id === c.node.cluster_id);
    if (grandchildren.length && c.r > 30) {
      const innerPacked = packCircles(grandchildren, c.x, c.y, c.r * 0.9);
      for (const ic of innerPacked) {
        allCircles.push(ic);
      }
    }
  }

  // Animate transition
  const oldCircles = circles;
  animCircles = allCircles;
  animT = 0;

  // Match old positions for smooth transition
  circles = allCircles.map(c => {
    const old = oldCircles.find(o => o.node.cluster_id === c.node.cluster_id);
    if (old) return { ...c, cx: old.x, cy: old.y, cr: old.r };
    return { ...c, cx: 0, cy: 0, cr: 0 };
  });

  updateBreadcrumb();
}

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  const parts = [];

  if (focusId === null) {
    bc.innerHTML = '<span class="current">All Clusters</span>';
    return;
  }

  parts.push({ id: null, name: 'All' });

  // Build path from root to focusId
  let current = allNodes.find(n => n.cluster_id === focusId);
  const path = [];
  while (current) {
    path.unshift(current);
    current = current.parent_id ? allNodes.find(n => n.cluster_id === current.parent_id) : null;
  }

  for (const p of path) {
    parts.push({ id: p.cluster_id, name: p.name || p.cluster_id });
  }

  bc.innerHTML = parts.map((p, i) => {
    const isLast = i === parts.length - 1;
    const sep = i > 0 ? '<span class="sep">/</span>' : '';
    if (isLast) return `${sep}<span class="current">${esc(p.name)}</span>`;
    return `${sep}<span onclick="zoomTo(${p.id === null ? 'null' : "'" + esc(p.id) + "'"})">${esc(p.name)}</span>`;
  }).join('');
}

function zoomTo(clusterId) {
  focusId = clusterId;
  selectedCircle = null;
  camX = 0; camY = 0; camZoom = 1; // reset camera on navigation
  closeInfo();
  packAndDraw();
}

// ── Rendering ──
function resize() {
  canvas.width = canvas.clientWidth * devicePixelRatio;
  canvas.height = canvas.clientHeight * devicePixelRatio;
}
window.addEventListener('resize', () => { resize(); packAndDraw(); });

function lerp(a, b, t) { return a + (b - a) * t; }

function screenToWorld(sx, sy) {
  const w = canvas.width / devicePixelRatio, h = canvas.height / devicePixelRatio;
  return [(sx - w/2) / camZoom + camX, (sy - h/2) / camZoom + camY];
}

function draw() {
  const pr = devicePixelRatio;
  const w = canvas.width, h = canvas.height;
  ctx.setTransform(pr, 0, 0, pr, 0, 0);
  ctx.fillStyle = '#06060c';
  ctx.fillRect(0, 0, w/pr, h/pr);

  // Apply camera
  ctx.save();
  ctx.translate(w/pr/2, h/pr/2);
  ctx.scale(camZoom, camZoom);
  ctx.translate(-camX, -camY);

  // Animate
  if (animT < 1) {
    animT = Math.min(1, animT + 0.04);
    const t = 1 - (1 - animT) ** 3; // ease out cubic
    for (let i = 0; i < circles.length; i++) {
      const c = circles[i];
      c.dx = lerp(c.cx, c.x, t);
      c.dy = lerp(c.cy, c.y, t);
      c.dr = lerp(c.cr, c.r, t);
    }
  } else {
    for (const c of circles) { c.dx = c.x; c.dy = c.y; c.dr = c.r; }
  }

  // Draw circles (back to front: larger first)
  const sorted = [...circles].sort((a,b) => b.dr - a.dr);

  for (const c of sorted) {
    if (c.dr < 1) continue;
    const color = getColor(c.node);
    const isHovered = hoveredCircle === c;
    const isSelected = selectedCircle === c;
    const hasChildren = allNodes.some(n => n.parent_id === c.node.cluster_id);
    const isTopLevel = focusId === null ? c.node.depth === 0 : c.node.parent_id === focusId;

    // Background fill
    if (isTopLevel) {
      ctx.fillStyle = getColorA(c.node, 0.07);
      ctx.beginPath(); ctx.arc(c.dx, c.dy, c.dr, 0, Math.PI*2); ctx.fill();
    }

    // Border
    ctx.strokeStyle = getColorA(c.node, isHovered ? 0.7 : isSelected ? 0.5 : 0.25);
    ctx.lineWidth = isHovered ? 2 : isSelected ? 2 : 1;
    ctx.beginPath(); ctx.arc(c.dx, c.dy, c.dr, 0, Math.PI*2); ctx.stroke();

    // Glow on hover
    if (isHovered || isSelected) {
      const grad = ctx.createRadialGradient(c.dx, c.dy, c.dr * 0.8, c.dx, c.dy, c.dr * 1.1);
      grad.addColorStop(0, getColorA(c.node, 0));
      grad.addColorStop(1, getColorA(c.node, isHovered ? 0.15 : 0.1));
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(c.dx, c.dy, c.dr * 1.1, 0, Math.PI*2); ctx.fill();
    }

    // Label — only for focus-level circles, and only when large enough on screen
    const screenR = c.dr * camZoom;
    if (isTopLevel && screenR > 25) {
      const name = c.node.name || c.node.cluster_id;
      const fontSize = Math.max(9, Math.min(14, c.dr * 0.15));
      ctx.font = `600 ${fontSize}px -apple-system,sans-serif`;
      ctx.fillStyle = getColorA(c.node, isHovered ? 1 : 0.8);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Wrap text if needed
      const maxWidth = c.dr * 1.4;
      const words = name.split(' ');
      const lines = [];
      let line = '';
      for (const word of words) {
        const test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = word;
        } else {
          line = test;
        }
      }
      lines.push(line);

      const lineH = fontSize * 1.3;
      const startY = c.dy - (lines.length - 1) * lineH / 2;
      for (let i = 0; i < lines.length; i++) {
        ctx.fillText(lines[i], c.dx, startY + i * lineH);
      }

      // Tag count below
      ctx.font = `${Math.max(8, fontSize * 0.7)}px var(--mono)`;
      ctx.fillStyle = getColorA(c.node, 0.4);
      ctx.fillText(`${c.node.tag_count}`, c.dx, startY + lines.length * lineH);
    }
  }

  ctx.restore();
  requestAnimationFrame(draw);
}

// ── Interaction ──
function getCircleAt(mx, my) {
  const [wx, wy] = screenToWorld(mx, my);
  // Check smallest first (they're on top visually)
  const sorted = [...circles].sort((a,b) => a.dr - b.dr);
  for (const c of sorted) {
    const dx = wx - c.dx, dy = wy - c.dy;
    if (dx*dx + dy*dy < c.dr * c.dr) return c;
  }
  return null;
}

canvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  dragStartX = e.clientX; dragStartY = e.clientY;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const c = getCircleAt(mx, my);
  if (!c) {
    dragging = true;
    dragCamX = camX; dragCamY = camY;
    canvas.style.cursor = 'grabbing';
  }
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;

  if (dragging) {
    camX = dragCamX - (e.clientX - dragStartX) / camZoom;
    camY = dragCamY - (e.clientY - dragStartY) / camZoom;
    return;
  }

  const c = getCircleAt(mx, my);
  hoveredCircle = c;
  canvas.style.cursor = c ? 'pointer' : 'grab';

  const tip = document.getElementById('tooltip');
  if (c) {
    tip.querySelector('.tooltip-name').textContent = c.node.name || c.node.cluster_id;
    tip.querySelector('.tooltip-count').textContent = `${c.node.tag_count} tags · depth ${c.node.depth}`;
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top = (e.clientY - 10) + 'px';
    tip.style.color = getColor(c.node);
    tip.classList.add('show');
  } else {
    tip.classList.remove('show');
  }
});

canvas.addEventListener('mouseup', () => { dragging = false; canvas.style.cursor = 'grab'; });
canvas.addEventListener('mouseleave', () => { dragging = false; hoveredCircle = null; document.getElementById('tooltip').classList.remove('show'); });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const [wx, wy] = screenToWorld(mx, my);

  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const newZoom = Math.max(0.2, Math.min(10, camZoom * factor));

  // Zoom toward mouse position
  camX = wx - (mx - canvas.clientWidth/2) / newZoom;
  camY = wy - (my - canvas.clientHeight/2) / newZoom;
  camZoom = newZoom;
}, {passive: false});

function getFocusLevelCircleAt(mx, my) {
  // Return the circle at the current focus level (not grandchildren)
  const [wx, wy] = screenToWorld(mx, my);
  const focusDepth = focusId === null ? 0 : (allNodes.find(n => n.cluster_id === focusId)?.depth ?? -1) + 1;
  const candidates = circles.filter(c => c.node.depth === focusDepth);
  for (const c of candidates) {
    const dx = wx - c.dx, dy = wy - c.dy;
    if (dx*dx + dy*dy < c.dr * c.dr) return c;
  }
  return null;
}

canvas.addEventListener('click', e => {
  // Ignore if we just finished dragging
  if (Math.abs(e.clientX - dragStartX) > 5 || Math.abs(e.clientY - dragStartY) > 5) return;

  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;

  if (e.detail === 2) {
    // Double-click: drill into the focus-level circle (not grandchild)
    const c = getFocusLevelCircleAt(mx, my);
    if (c) {
      const hasChildren = allNodes.some(n => n.parent_id === c.node.cluster_id);
      if (hasChildren) zoomTo(c.node.cluster_id);
    }
    return;
  }

  // Single click: select any circle (including grandchildren)
  const c = getCircleAt(mx, my);
  if (!c) { selectedCircle = null; closeInfo(); return; }
  selectedCircle = c;
  showInfo(c.node);
});

// ── Info panel ──
async function showInfo(node) {
  const detail = await api(`/api/${currentCorpus}/cluster/${encodeURIComponent(node.cluster_id)}`);
  const children = allNodes.filter(n => n.parent_id === node.cluster_id).sort((a,b) => b.tag_count - a.tag_count);
  const color = getColor(node);

  let html = `<div class="info-name" style="color:${color};text-shadow:0 0 10px ${getColorA(node, 0.25)}">${esc(node.name || node.cluster_id)}</div>`;
  html += `<div class="info-stat">${node.tag_count} tags · depth ${node.depth}</div>`;
  if (detail.description) html += `<div class="info-desc">${esc(detail.description)}</div>`;

  if (children.length) {
    html += `<div class="info-section">Sub-clusters (${children.length})</div>`;
    children.forEach(c => {
      const cc = getColor(c);
      const ccBorder = getColorA(c, 0.25);
      html += `<div style="display:inline-block;background:#0f0f1e;border:1px solid ${ccBorder};color:${cc};padding:3px 10px;border-radius:12px;font-size:11px;margin:2px;cursor:pointer" onclick="zoomTo('${esc(c.cluster_id)}')">${esc(c.name||c.cluster_id)} <span style="color:var(--dim)">${c.tag_count}</span></div>`;
    });
  }

  if (detail.tags.length) {
    html += `<div class="info-section">Top Tags (${detail.tags.length})</div>`;
    detail.tags.slice(0, 25).forEach(t => {
      html += `<div class="info-tag"><span class="info-tag-name">${esc(t.title)}</span><span class="info-tag-weight">${Math.round(t.weight)}</span></div>`;
    });
  }

  document.getElementById('info-content').innerHTML = html;
  document.getElementById('info').classList.add('open');
}

function closeInfo() { document.getElementById('info').classList.remove('open'); selectedCircle = null; }

function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;') : ''; }

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('add-modal').classList.contains('open')) { closeAddCorpus(); }
    else if (document.getElementById('info').classList.contains('open')) { closeInfo(); }
    else if (focusId !== null) {
      // Zoom out one level
      const current = allNodes.find(n => n.cluster_id === focusId);
      zoomTo(current?.parent_id || null);
    }
  }
  if (e.key === 'Backspace' && !e.target.matches('input')) {
    const current = allNodes.find(n => n.cluster_id === focusId);
    zoomTo(current?.parent_id || null);
  }
});

// ── Init ──
resize();
loadCorpora();
requestAnimationFrame(draw);
</script>
</body>
